name: vagabundo
description: Vagabundo — AI travel itinerary planner
publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Firebase functions
  cloud_functions: ^4.6.0
  # State management (ekvivalent @StateObject/@EnvironmentObject)
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Backend — isti kao iOS
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_analytics: ^10.8.5
  firebase_crashlytics: ^3.4.15

  # Zamjene iOS-specifičnih servisa
  google_maps_flutter: ^2.6.0     # MapKit
  purchases_flutter: ^8.11.0      # StoreKit / RevenueCat
  supabase_flutter: ^2.5.0        # Supabase (isti kao iOS)
  geolocator: ^12.0.0             # CoreLocation (device GPS)
  geocoding: ^4.0.0                # CLGeocoder (reverse geocoding)

  # Utility
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  in_app_review: ^2.0.9
  webview_flutter: ^4.10.0
  app_links: ^6.3.2
  http: ^1.2.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.5     # NetworkMonitor ekvivalent (Faza 5)
  pdf: ^3.12.0                   # PDF generisanje (itinerary export)
  printing: ^5.13.1              # PDF preview/share helper (radi sa 'pdf')
  # share_plus/printing zatraženi kao ^10.1.2/^5.13.4 — spušteno na najnoviju
  # verziju kompatibilnu sa firebase_core ^2.27.0/firebase_auth ^4.17.4 (noviji
  # share_plus/printing traže `web: ^1.0.0`, a stari Firebase paketi <0.5.0;
  # nadogradnja Firebase-a je van obima ovog zadatka). API korišten ovdje
  # (Share.share/Printing.sharePdf) je identičan u obje verzije.
  share_plus: ^10.0.0            # native OS share sheet (link/tekst/fajlovi)

  # Faza 6.5 — Settings port
  google_sign_in: ^6.2.2        # Google account linking
  audioplayers: ^6.1.0           # UI zvučni efekti (SoundManager port)
  package_info_plus: ^8.1.2     # appVersion/buildNumber za feedback
  # device_info_plus zatražen kao ^11.2.0 — spušten na ^10.1.2, isti obrazac
  # kao share_plus/printing ranije (device_info_plus 11.x traži `web: ^1.0.0`,
  # nekompatibilno sa firebase_auth ^4.17.4 → firebase_core ^2.27.0). API
  # korišten ovdje (DeviceInfoPlugin().androidInfo) identičan u obje verzije.
  device_info_plus: ^10.1.2     # deviceModel/systemVersion za feedback

  # Faza 8 — AdMob reklame (RevenueCat/IAP i dalje pauzirano)
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: false # iOS ikonica se ne dira
  image_path: "assets/images/3.0x/logo.png"
  min_sdk_android: 21
  # Android 12+ "themed" adaptive icon — logo već ima svoju plavu pozadinu
  # ugrađenu (krug/pin), pa koristimo istu sliku i za foreground, uz
  # cerulean pozadinsku boju da se uklopi ako sistem doda svoj tint/masku.
  adaptive_icon_background: "#0075A2" # AppColors.cerulean
  adaptive_icon_foreground: "assets/images/3.0x/logo.png"